groups:
  - name: cliniq_alerts
    rules:
      - alert: APIDown
        expr: up{job="fastapi"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CliniQ API is DOWN"

      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"cliniq.*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.name }}"